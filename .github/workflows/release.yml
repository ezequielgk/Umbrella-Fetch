name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Generate completions
        run: |
          mkdir -p completions
          ./target/${{ matrix.target }}/release/umbrella-fetch completions bash > completions/umbrella-fetch.bash
          ./target/${{ matrix.target }}/release/umbrella-fetch completions zsh > completions/_umbrella-fetch
          ./target/${{ matrix.target }}/release/umbrella-fetch completions fish > completions/umbrella-fetch.fish

      - name: Package tarball
        run: |
          ASSET="umbrella-fetch-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/umbrella-fetch .
          tar -czf "$ASSET" umbrella-fetch completions/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbrella-fetch-${{ matrix.target }}
          path: umbrella-fetch-*.tar.gz

  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: umbrella-fetch ${{ github.ref_name }}
          body: |
            ## umbrella-fetch ${{ github.ref_name }}
            
            ### Instalación
            Ver install.sh o las instrucciones del README.
            
            ### Assets
            Binario + completions para bash, zsh y fish incluidas en cada tarball.
          files: |
            artifacts/umbrella-fetch-*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
